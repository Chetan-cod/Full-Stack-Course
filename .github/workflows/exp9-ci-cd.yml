name: Exp9 React CI/CD

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Exp9/**'
      - '.github/workflows/exp9-ci-cd.yml'
  push:
    branches:
      - main
    paths:
      - 'Exp9/**'
      - '.github/workflows/exp9-ci-cd.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Exp9/frontend
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Exp9/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build production bundle
        run: npm run build

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Capture short SHA
        shell: bash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: chetancod/exp9-react-app
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./Exp9/frontend
          file: ./Exp9/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=https://api.example.com
